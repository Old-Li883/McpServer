# MCP Agent Configuration

agent:
  name: "mcp-agent"
  log_level: "INFO"

mcp:
  server_url: "http://localhost:8080"
  timeout: 30

llm:
  base_url: "http://localhost:11434"
  model: "qwen2:0.5b"
  temperature: 0.7
  max_tokens: 2048

conversation:
  max_history: 100
  system_prompt: |
    You are a helpful AI assistant with access to tools and resources.
    You can help users by:
    - Answering questions using your knowledge
    - Calling available tools when needed
    - Reading and processing resources
    - Providing clear and concise responses

cli:
  prompt_symbol: "> "
  multiline_prompt_symbol: "... "
  show_thinking: true
